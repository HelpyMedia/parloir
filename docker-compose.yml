services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: parloir-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: parloir
      POSTGRES_USER: parloir
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example to .env.local}
    volumes:
      - parloir_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parloir -d parloir"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  parloir_pgdata:
